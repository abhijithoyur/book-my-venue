version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: book-my-venue-db
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-bookmyvenue}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_HOST_AUTHENTICATION_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - book-my-venue-network

  # Django API Backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: book-my-venue-api
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DEBUG: "${DEBUG:-True}"
      SECRET_KEY: "${SECRET_KEY:-dev-secret-key-change-in-production}"
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@db:5432/${DATABASE_NAME:-bookmyvenue}
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost,127.0.0.1,api}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}"
      JWT_ACCESS_TOKEN_LIFETIME: "${JWT_ACCESS_TOKEN_LIFETIME:-900}"
      JWT_REFRESH_TOKEN_LIFETIME: "${JWT_REFRESH_TOKEN_LIFETIME:-604800}"
      EMAIL_BACKEND: "${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}"
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - book-my-venue-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/auth/me", "-H", "Authorization: Bearer invalid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # React Frontend Development Server
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: book-my-venue-web
    command: npm run dev
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8000/api/v1}"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - book-my-venue-network

volumes:
  postgres_data:
    driver: local

networks:
  book-my-venue-network:
    driver: bridge
